<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Said It? — real or fake, daily</title>
<meta name="description" content="Six quotes from this week. Some are real. Some are made up. Spot them. New set every day." />
<meta name="theme-color" content="#F7F8FC" />
<!-- Open Graph: spoiler-free, so a shared link in a group chat reads well -->
<meta property="og:title" content="Said It? — real or fake, daily" />
<meta property="og:description" content="6 quotes from this week. Some real, some made up. How many can you catch?" />
<meta property="og:type" content="website" />
<!-- PWA: installable, magpie icon + splash, offline shell via sw.js (Phase 4) -->
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Said It?" />
<!-- Bright redesign: one type family (Plus Jakarta Sans) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 112 112'%3E%3Crect width='112' height='112' rx='26' fill='%23EEF1FE'/%3E%3C/svg%3E" />
<style>
  :root{
    /* legacy tokens — still drive the not-yet-rebuilt intro/play/reveal/crew screens (later phases) */
    --bg:#F7F8FC;
    --grad:linear-gradient(165deg,#fff1f2 0%,#fff7ed 42%,#eef4ff 100%);
    --panel:#ffffff; --panel2:#f5f3fb; --line:#ece7f4;
    --mut:#6b6577; --dim:#a39cb1;
    --good:#16B981; --bad:#FA5252; --gold:#f59e0b; --accent:#4C6EF5;  /* accent re-pointed to the new primary blue so legacy chrome (archive/account) stays coherent */
    --r:16px; --shadow:0 6px 22px rgba(70,45,130,.10), 0 1px 3px rgba(0,0,0,.04);
    /* ---- Bright redesign tokens (single source of truth for the new UI) ---- */
    --primary:#4C6EF5; --primary-dark:#3B5BDB; --primary-soft:#EEF1FE; --primary-shadow:rgba(76,110,245,.5);
    --mint:#16B981; --fake:#FA5252; --real:#16B981; --amber:#FBA94C; --purple:#7048E8;
    --amber-text:#C76A09;   /* AA-safe amber for TEXT (the #FBA94C fill fails contrast as text) */
    --canvas:#F7F8FC; --card:#FFFFFF;
    --ink:#23253A; --ink2:#5B6079; --ink3:#6B6F8C;   /* muted text — darkened from #9499B5 to clear WCAG AA (4.9:1 on white) */
    --hair:#E6E8F0; --track:#EFF0F6;
    --shadow-card:0 5px 16px -12px rgba(40,50,90,.4);
    --shadow-raised:0 8px 22px -14px var(--primary-shadow);
  }
  /* coral is the alt theme (flip body.theme-coral; blue is the default/lead). AA-TUNED so it can be user-selectable:
     --primary clears 3:1 (large CTA text) and --primary-dark clears 4.5:1 (small/secondary text) on white. */
  body.theme-coral{ --primary:#E04A2E; --primary-dark:#B5362A; --primary-soft:#FFF1EE; --primary-shadow:rgba(224,74,46,.5); }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{background:var(--canvas);min-height:100%}
  body{margin:0 auto;background:var(--canvas);color:var(--ink);
    font:15px/1.5 'Plus Jakarta Sans',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%;
    padding:0 20px env(safe-area-inset-bottom);max-width:460px;min-height:100vh}
  header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 0 6px}
  .brand{display:flex;align-items:center;gap:4px}   /* Mags sits close to the wordmark, facing it */
  .mags-btn{background:none;border:none;padding:0;cursor:pointer;line-height:0;display:flex;align-items:center;justify-content:center;flex:none;border-radius:8px;min-width:44px;min-height:44px}
  .mags-btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
  .wm-btn{display:flex;align-items:center;background:none;border:none;padding:2px;cursor:pointer;text-align:left}
  .wm{font-weight:700;font-size:24px;letter-spacing:-.3px;color:var(--ink)}
  .wm b{color:var(--primary)}
  .mags-flip{transform:scaleX(-1)}
  .mags-bob{animation:mags-bob 2.4s ease-in-out infinite}
  @keyframes mags-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @media (prefers-reduced-motion: reduce){ .mags-bob{animation:none} .mags-cycle{animation:none} }
  .editiontag{color:var(--ink3);font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
  .sub{display:none}
  .hide{display:none !important}

  /* generic */
  button{font:inherit;cursor:pointer;border:none;border-radius:12px;color:var(--ink)}
  .btn{background:var(--accent);color:#fff;font-weight:700;padding:14px 16px;width:100%;
    border-radius:14px;font-size:17px;transition:transform .05s ease, filter .15s, box-shadow .15s;
    box-shadow:0 6px 16px rgba(124,92,255,.32)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{filter:grayscale(.55) opacity(.55);box-shadow:none;cursor:not-allowed}
  .btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .btn.gold{background:var(--gold);color:#3a2700;box-shadow:0 6px 16px rgba(245,158,11,.3)}
  .row{display:flex;gap:10px}

  /* intro */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin:10px 0;box-shadow:var(--shadow)}
  .lede{font-size:18px;line-height:1.45}
  .lede .real{color:var(--real);font-weight:700}
  .lede .fake{color:var(--fake);font-weight:700}
  .equityrow{display:flex;gap:10px;margin:10px 0}
  .pill{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
  .pill .n{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
  .pill .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em}

  /* quote cards */
  .progress{display:flex;gap:6px;margin:4px 2px 10px}
  .progress i{flex:1;height:4px;border-radius:2px;background:var(--line)}
  .progress i.done{background:var(--accent)}
  .progress i.locked{background:var(--gold)}
  .q{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin:12px 0;position:relative;box-shadow:0 3px 14px rgba(70,45,130,.07)}
  .q .num{position:absolute;top:-9px;left:12px;background:var(--panel2);border:1px solid var(--line);
    color:var(--mut);font-size:11px;font-weight:700;border-radius:20px;padding:2px 9px}
  .q blockquote{margin:6px 0 4px;font-size:18px;line-height:1.45;font-weight:500}
  .q .attr{color:var(--mut);font-size:13px;margin-bottom:12px}
  .q .attr b{color:var(--ink)}
  .choices{display:flex;gap:10px}
  .choice{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--line);background:var(--panel2);
    font-weight:700;text-align:center;color:var(--mut);user-select:none}
  .choice{transition:transform .05s ease}
  .choice:active{transform:scale(.97)}
  .choice.real.on{border-color:var(--real);color:#fff;background:var(--real);box-shadow:0 4px 12px rgba(16,163,106,.3)}
  .choice.fake.on{border-color:var(--fake);color:#fff;background:var(--fake);box-shadow:0 4px 12px rgba(239,77,91,.3)}
  .lockbtn{margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:9px;border-radius:10px;border:1px dashed var(--line);background:transparent;color:var(--dim);
    font-size:13px;font-weight:600;width:100%}
  .lockbtn.on{border-style:solid;border-color:var(--gold);color:#b4760a;background:rgba(245,158,11,.1)}

  .sticky{position:sticky;bottom:0;padding:12px 0 16px;background:linear-gradient(180deg,transparent,var(--bg) 22%)}
  .hint{color:var(--dim);font-size:12px;text-align:center;margin:6px 0 0}

  /* reveal */
  .scorehead{text-align:center;margin:8px 0 2px}
  .scorehead .big{font-size:44px;font-weight:800;line-height:1.05}
  .scorehead .cap{color:var(--mut)}
  .r-q{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0;border-left:4px solid var(--line)}
  .r-q.correct{border-left-color:var(--good)}
  .r-q.wrong{border-left-color:var(--bad)}
  .r-q .tag{font-size:12px;font-weight:800;letter-spacing:.03em;text-transform:uppercase}
  .r-q .tag.real{color:var(--real)} .r-q .tag.fake{color:var(--fake)}
  .r-q blockquote{margin:6px 0;font-size:15px;color:var(--ink)}
  .r-q .meta{font-size:12.5px;color:var(--mut)}
  .r-q .meta a{color:var(--accent)}
  .r-q .verdict{font-size:12px;font-weight:700;float:right}
  .r-q .verdict.correct{color:var(--good)} .r-q .verdict.wrong{color:var(--bad)}
  .r-q .lockmark{color:var(--gold);font-weight:700}
  .qshare{margin-top:10px;background:var(--panel2);border:1px solid var(--line);color:var(--accent);
    font-size:13px;font-weight:600;border-radius:10px;padding:9px 11px;min-height:40px}
  .gotme{background:rgba(239,77,91,.08);border:1px solid rgba(239,77,91,.35);border-radius:12px;padding:12px;margin:12px 0}
  .gotme b{color:var(--fake)}
  .trick{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;margin:12px 0;font-size:14px;color:var(--mut)}

  .token{white-space:pre;font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;
    background:#faf8ff;border:1px solid var(--line);border-radius:12px;padding:14px;overflow-x:auto;color:var(--ink)}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--gold);color:#231a00;
    font-weight:700;padding:10px 16px;border-radius:30px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  .freeze{background:rgba(124,92,255,.09);border:1px solid rgba(124,92,255,.4);color:var(--accent);
    border-radius:10px;padding:9px 12px;font-size:13px;margin:8px 0;text-align:center}
  .count{text-align:center;color:var(--mut);font-size:13px;margin:14px 0 6px}
  .count b{color:var(--ink);font-variant-numeric:tabular-nums}
  /* crew */
  .lb-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--line);font-size:14px}
  .lb-row:last-child{border-bottom:none}
  .lb-row .rk{width:26px;font-weight:800;text-align:center}
  .lb-row .nm{flex:1;font-weight:600} .lb-row .nm.you{color:var(--accent)}
  .lb-row .sc{font-weight:800;font-variant-numeric:tabular-nums}
  .crew-code{display:inline-block;font:700 16px ui-monospace,Menlo,monospace;letter-spacing:.14em;
    background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:5px 12px;color:var(--accent)}
  .crewbadge{font-size:11px;color:var(--accent);font-weight:700}
  .lanes{display:flex;gap:8px;justify-content:center;margin:2px 0 12px;flex-wrap:wrap}
  .lane-b{padding:7px 13px;border-radius:20px;border:1px solid var(--line);background:var(--panel2);
    color:var(--mut);font-weight:600;font-size:13px;cursor:pointer}
  .lane-b.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 3px 10px rgba(124,92,255,.28)}
  .crewcard{background:rgba(124,92,255,.06);border:1px solid rgba(124,92,255,.3)}
  input.fld{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--line);background:#fff;
    font:inherit;color:var(--ink);margin:6px 0}
  /* archive + past-edition nav */
  .navlinks{display:flex;gap:16px;justify-content:center;margin:16px 0 4px;flex-wrap:wrap}
  .navlink{color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;background:none;border:none;padding:6px}
  #pastbar{background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.4);border-radius:10px;padding:8px 12px;margin:0 2px 12px;font-size:13px;color:var(--gold);display:flex;justify-content:space-between;align-items:center;gap:8px}
  #pastbar a{color:var(--ink);text-decoration:underline;cursor:pointer;white-space:nowrap}
  .arc-row{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin:8px 0}
  .arc-row .meta{flex:1;min-width:0}
  .arc-row .ed{font-weight:700}
  .arc-row .st{font-size:12px;color:var(--mut)}
  .arc-row button{padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-size:13px;font-weight:600;white-space:nowrap}
  .arc-row button.play{background:var(--accent);color:#06101f;border-color:var(--accent)}
  footer{color:var(--dim);font-size:11px;text-align:center;padding:24px 0 30px;line-height:1.6}
  footer a{color:var(--dim)}
  .err{color:var(--fake);text-align:center;padding:30px 10px}
  a.reset{color:var(--dim);font-size:11px;text-decoration:underline;cursor:pointer}

  /* header home control + home hub */
  .logo{cursor:pointer;background:none;border:none;padding:0;text-align:left}
  .catcard:focus-visible,.homecrew:focus-visible,.logo:focus-visible,.lane-b:focus-visible,.navlink:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .hero{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px 16px;margin:10px 0;
    box-shadow:var(--shadow);text-align:center}
  .hero .streak{font-size:46px;font-weight:800;line-height:1.04;font-variant-numeric:tabular-nums}
  .hero .streaklbl{color:var(--mut);font-size:14px;margin-top:2px}
  .hero .best{color:var(--dim);font-size:12px;margin-top:7px}
  .herorow{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:8px;flex-wrap:wrap}
  .hero .best{color:var(--mut);font-size:12.5px;font-weight:600}
  .d7wrap{display:inline-flex;gap:5px;align-items:center}
  .d7{width:12px;height:12px;border-radius:3px;background:var(--line);border:1px solid #e0d8ee}
  .d7.on{background:var(--accent);border-color:var(--accent)}
  .d7.today{box-shadow:0 0 0 2px var(--gold);border-color:var(--gold)}   /* today = rightmost, ringed */
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
  .statcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 14px;
    box-shadow:0 3px 14px rgba(70,45,130,.06);min-height:84px}
  .statcard.tap{cursor:pointer}
  .statcard .sc-top{display:flex;align-items:center;justify-content:space-between}
  .statcard .sc-big{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--ink)}
  .statcard .sc-lbl{font-size:13px;font-weight:700;color:var(--ink);margin-top:3px}
  .statcard .sc-sub{font-size:11.5px;color:var(--mut);margin-top:2px;line-height:1.35}
  .statcard .bar{height:7px;border-radius:5px;background:var(--panel2);border:1px solid var(--line);margin:7px 0 4px;overflow:hidden}
  .statcard .bar i{display:block;height:100%;background:var(--accent);border-radius:5px}
  .brk-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);min-height:44px}
  .brk-row:last-child{border-bottom:none}
  .brk-l{font-weight:600;color:var(--ink)} .brk-v{font-size:13px;color:var(--mut);font-variant-numeric:tabular-nums}
  .brk-v.dim{color:var(--mut)}   /* WCAG AA: --mut 5.6:1 (--dim failed at 2.64:1) */
  /* H-B social home: crew-standing headline, coach line, tappable tiles, detail views */
  .headline{background:linear-gradient(135deg,rgba(124,92,255,.12),rgba(245,158,11,.10));border:1px solid rgba(124,92,255,.3);
    border-radius:14px;padding:13px 15px;margin:10px 0 0;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:52px}
  .headline .hl-main{font-weight:800;font-size:16px;color:var(--ink)} .headline .hl-sub{font-size:12.5px;color:var(--mut);margin-top:2px}
  .headline .go{color:var(--accent);font-weight:800;white-space:nowrap}
  .coach{background:rgba(16,163,106,.08);border:1px solid rgba(16,163,106,.30);border-radius:12px;padding:9px 13px;margin:10px 0 0;font-size:13px;color:#0a7d50;font-weight:600}
  .statcard.tap .sc-top::after{content:"›";color:var(--accent);font-weight:800;margin-left:auto}
  .detail-h{font-size:20px;font-weight:800;margin:14px 2px 4px}
  .detail-sub{color:var(--mut);font-size:13px;margin:0 2px 12px}
  .hist-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 12px;border-bottom:1px solid var(--line);min-height:44px}
  .hist-row:last-child{border-bottom:none}
  .hist-row .hl{font-weight:600;color:var(--ink)} .hist-row .hr{color:var(--mut);font-size:13px;font-variant-numeric:tabular-nums}
  .ladder-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin:4px 0}
  .ladder-row.cur{background:rgba(124,92,255,.10);border:1px solid rgba(124,92,255,.35)}
  .ladder-row .lt{flex:1;font-weight:600} .ladder-row.cur .lt{color:var(--accent)} .ladder-row .lm{font-size:12px;color:var(--mut)}
  .gap{font-size:12px;color:var(--gold);font-weight:600}
  .seclabel{font-weight:800;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);margin:18px 4px 8px}
  .catcard{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:14px;margin:9px 0;box-shadow:0 3px 14px rgba(70,45,130,.07);cursor:pointer;
    transition:transform .05s ease, box-shadow .15s}
  .catcard:active{transform:translateY(1px)}
  .catcard .ic{font-size:24px;width:32px;text-align:center;flex:none}
  .catcard .cc{flex:1;min-width:0}
  .catcard .ct{font-weight:700;font-size:16px}
  .catcard .cs{font-size:12.5px;color:var(--mut)}
  .catcard .cs.done{color:var(--real);font-weight:600}
  .catcard .go{font-weight:800;color:var(--accent);font-size:14px;white-space:nowrap}
  .catcard.done{border-color:rgba(16,163,106,.35)}
  .homecrew{display:flex;align-items:center;gap:12px;background:rgba(124,92,255,.06);
    border:1px solid rgba(124,92,255,.3);border-radius:14px;padding:14px;margin:14px 0 2px;cursor:pointer}
  .homecrew .ic{font-size:22px;width:32px;text-align:center;flex:none}
  .homecrew .cc{flex:1;min-width:0} .homecrew .ct{font-weight:700} .homecrew .cs{font-size:12.5px;color:var(--mut)}
  .homecrew .go{font-weight:800;color:var(--accent);font-size:14px;white-space:nowrap}

  /* ============================================================
     BRIGHT REDESIGN — Home (Phase 1)
     ============================================================ */
  .mags{display:block;overflow:visible}
  #screen-home{padding-bottom:30px}

  /* hero: in-crew standing card */
  .hero-crew{background:var(--primary-soft);border-radius:12px;padding:20px 20px 22px;margin:8px 0 0;
    box-shadow:var(--shadow-raised);cursor:pointer}
  .hero-crew:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
  .hc-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .hc-name{display:flex;align-items:center;gap:7px;background:var(--card);color:var(--ink);border:none;
    border-radius:9px;padding:8px 11px 8px 14px;font-weight:600;font-size:15px;min-height:40px;cursor:pointer;
    box-shadow:0 3px 10px -5px rgba(40,50,90,.3);max-width:70%}
  .hc-name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hc-name svg{flex:none;stroke:var(--primary)}
  .hc-week{font-size:12px;font-weight:700;color:var(--primary-dark);opacity:.8;white-space:nowrap}
  .hc-rank{display:flex;align-items:flex-end;gap:10px;line-height:.9;margin-top:14px}
  .hc-rank-n{font-weight:700;font-size:56px;color:var(--ink);letter-spacing:-2px;font-variant-numeric:tabular-nums}
  .hc-rank-of{font-weight:600;font-size:19px;color:var(--ink2);padding-bottom:9px}
  .hc-gap{margin-top:10px;font-size:14.5px;font-weight:600;color:var(--ink2)}
  .hc-foot{display:flex;align-items:center;margin-top:15px}
  .hc-avs{display:flex}
  .av{width:34px;height:34px;border-radius:50%;background:var(--card);border:2px solid var(--ink3);
    margin-right:-9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .hc-see{margin-left:18px;font-size:13px;font-weight:700;color:var(--primary-dark)}

  /* hero: solo / new-player nudge */
  .hero-solo{background:var(--primary-soft);border-radius:12px;padding:22px;margin:8px 0 0;box-shadow:var(--shadow-raised)}
  .hs-top{display:flex;align-items:center;gap:12px}
  .hs-mags{flex:none;line-height:0}
  .hs-title{font-weight:700;font-size:23px;color:var(--ink);letter-spacing:-.4px;line-height:1.05}
  .hs-sub{font-size:14px;font-weight:500;color:var(--ink2);margin-top:4px}
  .hs-btn{width:100%;margin-top:16px;border:none;background:var(--card);color:var(--primary-dark);
    font-weight:700;font-size:15px;padding:14px;border-radius:9px;cursor:pointer;min-height:48px;
    box-shadow:0 4px 12px -6px rgba(40,50,90,.3)}

  /* play CTA (outline-first) */
  .play-cta{width:100%;margin-top:16px;cursor:pointer;background:transparent;border:2.5px solid var(--primary);
    color:var(--primary);border-radius:9px;padding:19px;font-weight:700;font-size:21px;letter-spacing:-.2px;
    display:flex;align-items:center;justify-content:center;gap:9px}
  .play-cta svg{stroke:var(--primary)}
  .play-sub{text-align:center;margin-top:9px;font-size:13px;font-weight:600;color:var(--ink3)}

  /* mascot fakes note — a button (opens the Magpie page); Mags faces right into the text via a speech tail */
  .fakes-note{margin-top:12px;width:100%;display:flex;align-items:center;gap:6px;background:var(--card);border-radius:8px;
    padding:12px 15px;box-shadow:var(--shadow-card);cursor:pointer;text-align:left;border:none}
  .fakes-note:active{transform:scale(.99)} .fakes-note{transition:transform .06s ease}
  .fakes-note .fn-mags{flex:none;line-height:0;position:relative;display:flex;align-items:center}
  .fakes-note .fn-tail{position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:0;height:0;
    border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:7px solid var(--primary-soft)}
  .fakes-note .fk-txt{font-size:14px;font-weight:600;color:#3A3D55;line-height:1.35;margin-left:8px}
  .fakes-note .fk{color:var(--fake);font-weight:700}

  /* streak + 7-day strip */
  .streak-blk{margin-top:24px}
  .streak-head{display:flex;align-items:center;gap:10px}
  .streak-head .fire{font-size:25px}
  .streak-num{font-weight:700;font-size:30px;color:var(--amber-text);font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .streak-num.zero{color:var(--ink3)}
  .streak-lbl{font-size:14.5px;font-weight:700;color:#3A3D55;line-height:1.2}
  .streak-lbl .best-yet{color:var(--mint);font-weight:600;font-size:13px}
  .streak-lbl .best-num{color:var(--ink3);font-weight:600;font-size:13px}
  .d7strip{display:flex;gap:7px;margin-top:14px}
  .d7cell{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
  .d7pill{position:relative;overflow:hidden;width:100%;height:38px;border-radius:8px;background:var(--card);display:flex;align-items:center;justify-content:center;
    border:2px solid var(--hair)}
  .d7pill.hit{border:2px solid var(--mint)}
  .d7pill.today{border:2px dashed var(--primary)}
  /* proportional fill = lanes done that day / lanes available that day (the 6-lane loop's sixths) */
  .d7fill{position:absolute;left:0;right:0;bottom:0;background:var(--mint);opacity:.85}
  .d7pill.today .d7fill{background:var(--primary)}
  .d7pill svg{position:relative;z-index:1;stroke:#fff}   /* check sits above the fill (white on the mint/primary fill) */
  .d7pill:not(.hit):not(.today) svg{stroke:var(--mint)}  /* a check with no fill (synthetic states) keeps the mint stroke */
  .d7lbl{font-size:11px;font-weight:700;color:var(--ink3)}
  .d7lbl.hit{color:var(--mint)} .d7lbl.today{color:var(--primary-dark)}   /* AA: small text → the darker accent (clears 4.5:1 in both themes) */

  /* TODAY module — the 6-lane daily loop: a row of lane segments + a done/total count */
  .today-card{margin-top:18px;background:var(--card);border-radius:9px;padding:14px 15px;box-shadow:var(--shadow-card)}
  .today-card.swept{background:#E7F8F1;box-shadow:none}
  .today-head{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .today-title{font-size:14.5px;font-weight:700;color:#3A3D55}
  .today-card.swept .today-title{color:#1C6B4F}
  .today-count{margin-left:auto;font-size:12.5px;font-weight:700;color:var(--ink3);font-variant-numeric:tabular-nums}
  .today-segs{display:flex;gap:7px}
  .today-seg{flex:1;min-width:0;height:40px;border-radius:9px;border:2px solid var(--ink3);background:transparent;cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  .today-seg.done{border-width:0}
  .today-seg svg{stroke:#fff}
  .today-seg:active{transform:scale(.96)}
  .today-seg{transition:transform .06s ease}
  .today-seg:focus-visible{outline:2px solid var(--primary);outline-offset:2px}

  /* coach line (mint-tinted) */
  .coach{background:#E7F8F1;border:none;border-radius:8px;padding:13px 15px;margin:20px 0 0;
    font-size:13.5px;font-weight:600;color:#1C6B4F;line-height:1.35}

  /* stat chips row */
  .stat-row{display:flex;gap:9px;margin-top:18px}
  .stat-chip{flex:1;min-width:0;border:none;background:var(--card);cursor:pointer;border-radius:8px;
    padding:13px 12px;text-align:left;min-height:62px;box-shadow:var(--shadow-card)}
  .stat-chip .sc-lbl{font-size:11px;font-weight:700;color:var(--ink3)}
  .stat-chip .sc-val{font-weight:700;font-size:19px;color:var(--ink);margin-top:4px;letter-spacing:-.3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* footer links */
  .home-links{margin-top:18px;display:flex;align-items:center;justify-content:center;gap:12px;
    font-size:13px;font-weight:600;color:var(--ink3)}
  .home-links .navlink{color:var(--ink3);background:none;border:none;cursor:pointer;font:inherit;font-weight:600;padding:6px 2px}
  .home-links .dot-sep{opacity:.5}

  .play-cta:active,.hs-btn:active,.stat-chip:active,.hc-name:active,.hero-crew:active{transform:scale(.985)}
  .play-cta,.hs-btn,.stat-chip,.hc-name,.hero-crew{transition:transform .06s ease}

  /* ============================================================
     BRIGHT REDESIGN — Lanes picker + Play (Phase 2)
     ============================================================ */
  /* inner screens carry their own back header; hide the global brand header there */
  body.scr-lanes header, body.scr-play header{display:none}

  .scr-head{display:flex;align-items:center;gap:13px;padding:6px 0 16px}
  .back-btn{border:none;background:var(--card);width:44px;height:44px;border-radius:9px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 4px 12px -7px rgba(40,50,90,.5)}
  .back-btn svg{stroke:var(--ink)}
  .scr-title{font-weight:700;font-size:25px;color:var(--ink);letter-spacing:-.4px}
  .hdr-mags{margin-left:auto;background:none;border:none;cursor:pointer;padding:0;line-height:0;flex:none;border-radius:8px;display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px}  /* small brand Mags on inner screens; 44px tap area */
  .hdr-mags:focus-visible{outline:2px solid var(--primary);outline-offset:2px}

  /* Lanes picker */
  #screen-lanes{padding-bottom:120px}
  .lanes-sub{font-size:14.5px;font-weight:500;color:var(--ink2);margin:-6px 0 20px;line-height:1.5}
  .lane-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .lane-card{position:relative;border:2px solid var(--card);cursor:pointer;background:var(--card);border-radius:9px;
    padding:16px;text-align:left;min-height:112px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-card)}
  .lane-card .lc-top{display:flex;align-items:center;justify-content:space-between;min-height:30px}
  .lane-dot{width:34px;height:34px;border-radius:50%;border:2.5px solid var(--ink3);background:transparent;flex:none;
    display:flex;align-items:center;justify-content:center}
  .lane-dot.done{border-width:0}
  .lane-badge{display:flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;letter-spacing:.3px;padding:3px 8px;border-radius:6px}
  .lane-badge.hot{color:#9A5B12;background:#FFF1DE}
  .lane-badge.adult{background:transparent;border:1.5px solid var(--purple);color:var(--purple)}
  .lane-name{font-weight:700;font-size:19px;color:var(--ink);letter-spacing:-.3px}
  .lane-vibe{font-size:12.5px;font-weight:500;color:var(--ink3);margin-top:2px}
  .lane-played{color:#0E7A55;font-weight:700}   /* darker green for AA on white (mint dot fill stays mint) */
  .sticky-cta{position:sticky;bottom:0;left:0;right:0;margin:30px -20px -120px;padding:16px 20px 26px;
    background:linear-gradient(to top,var(--canvas) 70%,rgba(247,248,252,0))}
  .outline-cta{width:100%;cursor:pointer;background:transparent;border:2.5px solid var(--primary);color:var(--primary);
    border-radius:9px;padding:18px;font-weight:700;font-size:19px;letter-spacing:-.2px;display:flex;align-items:center;justify-content:center;gap:8px}
  .outline-cta svg{stroke:var(--primary)}

  /* Play */
  #screen-play{padding-bottom:150px;min-height:100%}
  .play-head{display:flex;align-items:center;gap:11px;padding:6px 0 16px}
  .pbar{display:flex;gap:6px;flex:1}
  .pseg{flex:1;height:44px;border:none;cursor:pointer;background:none;position:relative;padding:0;display:flex;align-items:center;justify-content:center}
  .pseg .bar{width:100%;height:8px;border-radius:4px;background:var(--hair)}
  .pseg.cur .bar{background:var(--primary)}
  .pseg.ans .bar{background:var(--ink2)}   /* answered = ink (not mint) — mint is reserved for REAL (A) */
  .pseg.lck .bar{background:var(--amber)}
  /* play top-bar category strip */
  .play-cat{display:flex;align-items:center;justify-content:space-between;margin:-4px 0 12px}
  .play-cat .qchip{display:inline-flex;align-items:center;gap:6px}
  .qcard-top{justify-content:flex-end}
  .pseg .lockico{position:absolute;top:-2px;left:50%;transform:translateX(-50%);line-height:0}
  .pseg .lockico svg{stroke:var(--amber)}
  .pstep{font-size:13px;font-weight:700;color:var(--ink3);font-variant-numeric:tabular-nums;flex:none}
  .qcard{position:relative;background:var(--card);border-radius:11px;padding:24px 22px 22px;overflow:hidden;
    touch-action:none;cursor:grab;box-shadow:0 14px 34px -20px rgba(40,50,90,.5);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
  .qtint{position:absolute;inset:0;pointer-events:none;opacity:0}
  .qtint.real{background:var(--mint)} .qtint.fake{background:var(--fake)}
  .qcard-top{position:relative;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .qchip{font-size:12px;font-weight:700;background:transparent;border:1.5px solid var(--ink3);padding:4px 10px;border-radius:6px}
  .qdate{font-size:12px;font-weight:600;color:var(--ink3)}
  .qtext{position:relative;font-weight:600;font-size:24px;line-height:1.34;color:var(--ink);letter-spacing:-.2px}
  .qspk{position:relative;margin-top:18px;display:flex;align-items:center;gap:11px}
  .qav{width:36px;height:36px;border-radius:50%;background:var(--card);border:2px solid var(--ink3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex:none}
  .qspk .nm{font-size:15px;font-weight:700;color:var(--ink)}
  /* context line: one fixed-width line (ellipsis) so its LENGTH isn't a real/fake tell (J — UI half of context parity) */
  .qspk .rl{font-size:12.5px;font-weight:500;color:var(--ink3);max-width:248px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .swipe-hint{text-align:center;font-size:12px;font-weight:600;color:#5C6180}
  /* in-set nav: explicit prev/next flanking the swipe hint (swipe stays the primary input) */
  .play-nav{display:flex;align-items:center;gap:10px;margin-top:10px}
  .play-nav .swipe-hint{flex:1;margin:0}
  .pnav{flex:none;width:44px;height:44px;border-radius:9px;border:2px solid var(--track);background:var(--card);cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  .pnav svg{stroke:var(--ink2)}
  .pnav:disabled{opacity:.4;cursor:default}
  .pnav:active:not(:disabled){transform:scale(.95)} .pnav{transition:transform .06s ease}
  .pnav:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
  .rf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .rfbtn{border:2px solid var(--card);cursor:pointer;border-radius:9px;padding:16px 12px;background:var(--card);
    display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:var(--shadow-card)}
  .rfbtn .ic{display:flex;align-items:center;justify-content:center}
  .rfbtn.real .ic{width:38px;height:38px;border-radius:50%;border:2.5px solid var(--mint)}
  .rfbtn.fake .ic{width:38px;height:30px;border-radius:6px;border:2.5px solid var(--fake);transform:rotate(-5deg)}
  .rfbtn.real .ic svg{stroke:var(--mint)} .rfbtn.fake .ic svg{stroke:var(--fake)}
  .rfbtn .lbl{font-weight:700;font-size:17px}
  .rfbtn.real .lbl{color:#1C6B4F} .rfbtn.fake .lbl{color:#B0282E}   /* AA on white + on the selected tints */
  .rfbtn.real.sel{background:#E7F8F1;border-color:var(--mint);box-shadow:0 8px 20px -12px var(--mint)}
  .rfbtn.real.sel .lbl{color:#1C6B4F}
  .rfbtn.fake.sel{background:#FFECEC;border-color:var(--fake);box-shadow:0 8px 20px -12px var(--fake)}
  .rfbtn.fake.sel .lbl{color:#B0282E}
  .rfbtn .ic.pop{animation:sit-pop .32s cubic-bezier(.34,1.7,.5,1)}
  .lockbtn2{width:100%;margin-top:12px;border:2px solid var(--track);cursor:pointer;border-radius:8px;padding:14px;min-height:54px;
    background:var(--card);display:flex;align-items:center;justify-content:center;gap:10px}
  .lockbtn2 .ic{width:30px;height:30px;border-radius:6px;border:2px solid var(--ink3);display:flex;align-items:center;justify-content:center}
  .lockbtn2 .ic svg{stroke:var(--ink3)}
  .lockbtn2 .lbl{font-weight:700;font-size:16px;color:var(--ink3)}
  .lockbtn2.ready{border-color:var(--amber);background:#FFF9F0}
  .lockbtn2.ready .ic,.lockbtn2.on .ic{border-color:var(--amber)}
  .lockbtn2.ready .ic svg,.lockbtn2.on .ic svg{stroke:var(--amber)}
  .lockbtn2.ready .lbl,.lockbtn2.on .lbl{color:#9A5B12}   /* AA on the warm lock backgrounds */
  .lockbtn2.on{border-color:var(--amber);background:#FFF4E2;box-shadow:0 8px 20px -12px var(--amber)}
  .lockbtn2.pulse{animation:sit-pulse .42s cubic-bezier(.34,1.56,.64,1)}
  .lock-sub{text-align:center;font-size:12.5px;font-weight:500;color:var(--ink3);margin-top:9px;line-height:1.4}
  .cta-wrap{position:sticky;bottom:0;left:0;right:0;margin:22px -20px -150px;padding:14px 20px 26px;
    background:linear-gradient(to top,var(--canvas) 70%,rgba(247,248,252,0))}
  .cta-btn{width:100%;border:2.5px solid var(--primary);cursor:pointer;background:transparent;color:var(--primary);
    border-radius:9px;padding:18px;font-weight:700;font-size:19px;letter-spacing:-.2px}
  .cta-btn.next{border:none;background:var(--card);color:var(--primary-dark);box-shadow:0 6px 18px -10px rgba(40,50,90,.4)}
  .cta-btn.disabled{border:none;background:#EAECF3;color:#6E7290;cursor:default}
  .cta-btn.lockfirst{border:none;background:#FFF4E2;color:#9A5B12;cursor:default}

  .rfbtn:active,.lockbtn2:active,.back-btn:active,.lane-card:active,.outline-cta:active,
  .cta-btn.next:active{transform:scale(.97)}
  .rfbtn,.lockbtn2,.back-btn,.lane-card,.outline-cta,.cta-btn{transition:transform .06s ease, background .2s, border-color .15s}
  @keyframes sit-pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
  @keyframes sit-pulse{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}

  /* ============================================================
     BRIGHT REDESIGN — Reveal (Phase 3)
     ============================================================ */
  #screen-reveal{padding-bottom:36px}
  .rv-confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:60}
  .rv-confetti i{position:absolute;top:-16px;display:block;animation-name:sit-confetti;animation-timing-function:ease-in;animation-fill-mode:forwards}
  @keyframes sit-confetti{0%{transform:translateY(-16px) rotate(0);opacity:1}100%{transform:translateY(900px) rotate(560deg);opacity:0}}
  @keyframes sit-stamp{0%{transform:translateY(-14px) scale(.6) rotate(-10deg);opacity:0}60%{transform:translateY(0) scale(1.08) rotate(-4deg);opacity:1}100%{transform:scale(1) rotate(-4deg);opacity:1}}

  .rv-head{display:flex;align-items:center;gap:14px;padding:8px 0 4px}
  .rv-head .mags{flex:none}
  .rv-score{display:flex;align-items:flex-end;gap:8px;line-height:.85}
  .rv-score .n{font-weight:700;font-size:64px;color:var(--primary);letter-spacing:-2px;font-variant-numeric:tabular-nums}
  .rv-score .of{font-weight:600;font-size:22px;color:var(--ink3);padding-bottom:9px}
  .rv-cap{font-size:21px;font-weight:500;color:var(--ink);margin-top:10px;letter-spacing:-.2px;line-height:1.3}
  .rv-cap .replayed{color:var(--ink3);font-weight:500;font-size:14px}
  .rv-streak{margin-top:14px;display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;color:var(--ink2)}
  .rv-streak .fire{font-size:19px}
  .rv-streak .num{font-weight:700;font-size:22px;color:var(--amber-text);font-variant-numeric:tabular-nums;display:inline-block;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
  .rv-streak .num.bump{transform:scale(1.3)}
  .rv-freeze{margin-top:12px;background:var(--primary-soft);border-radius:8px;padding:10px 13px;font-size:13px;font-weight:600;color:var(--primary-dark)}
  .rv-gotme{margin-top:20px;background:#FFF1F1;border-radius:9px;padding:17px}
  .rv-gotme .k{font-size:12px;font-weight:700;color:#B5363B}
  .rv-gotme .q{font-weight:600;font-size:17px;line-height:1.35;color:var(--ink);margin-top:8px}
  .rv-gotme .m{font-size:12.5px;font-weight:600;color:#8A4A4D;margin-top:8px}
  .rv-clean{margin-top:20px;background:#E7F8F1;border-radius:9px;padding:16px 18px;display:flex;align-items:center;gap:10px;font-size:16px;font-weight:500;color:#1C6B4F}
  .rv-clean .mags{flex:none}
  .rv-truth-label{margin-top:24px;font-size:12px;font-weight:700;color:var(--ink3);margin-bottom:11px}
  .rv-truth{display:flex;flex-direction:column;gap:9px}
  .tr{background:var(--card);border-radius:8px;padding:14px 15px;box-shadow:0 4px 14px -12px rgba(40,50,90,.4);opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s}
  .tr.shown{opacity:1;transform:none}
  .tr-row{display:flex;align-items:flex-start;gap:12px}
  .tr-stamp{flex:none;width:48px;display:flex;justify-content:center;padding-top:2px}
  .stamp{font-weight:700;font-size:11px;letter-spacing:.3px;background:transparent;border:1.5px solid;border-radius:7px;padding:4px 6px;transform:rotate(-4deg);display:inline-block}
  /* AA: mint/coral fail as 11px label text on white — keep the colored BORDER (truth identity), darken the TEXT to clear AA */
  .stamp.real{color:#1C6B4F;border-color:var(--mint)} .stamp.fake{color:#B0282E;border-color:var(--fake)}
  .tr.shown .stamp{animation:sit-stamp .4s cubic-bezier(.34,1.56,.64,1) both}
  .tr-body{flex:1;min-width:0}
  .tr-q{font-size:14px;font-weight:600;color:#3A3D55;line-height:1.4}
  .tr-meta{font-size:11.5px;font-weight:600;color:var(--ink3);margin-top:6px}
  .tr-meta a{color:var(--primary-dark)}
  .tr-note{font-size:12.5px;font-weight:500;color:#C0454A;margin-top:8px;line-height:1.4;background:#FFF1F1;border-radius:7px;padding:8px 10px}
  /* uniform citation (reals + fakes share footprint/formatting) */
  .tr-cite{display:inline-block;margin-top:7px;font-size:12px;font-weight:600;text-decoration:none}
  a.tr-cite{color:var(--primary-dark)}
  .tr-cite.muted{color:var(--ink3)}
  .tr-cite.fake{display:block;color:#8A4A4D;font-weight:500;line-height:1.4;background:#FFF1F1;border-radius:7px;padding:8px 10px}
  .tr-cite.fake b{color:#B0282E;font-weight:700}
  /* worded verdict chip — your result (blue/amber + word), off the mint/coral truth axis (F) */
  .tr-verdict{flex:none;display:flex;align-items:flex-start;padding-top:2px}
  .vchip{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:5px 9px;border-radius:8px;white-space:nowrap}
  .vchip svg{width:12px;height:12px}
  .vchip.right{background:var(--primary-dark);color:#fff} .vchip.right svg{stroke:#fff}   /* darker fill so white text clears AA */
  .vchip.wrong{background:transparent;border:1.5px solid var(--amber);color:#9A5B12} .vchip.wrong svg{stroke:#9A5B12}
  .vchip.skip{background:var(--track);color:var(--ink2)}
  .rv-clean-ic{flex:none;display:flex}
  /* G: reveal shows ONE magpie (the score reaction) — drop the header brand bird here */
  body.scr-reveal #magsBtn{display:none}

  .share-card{margin-top:26px;border-radius:11px;padding:22px;overflow:hidden;background:var(--card);border:2px solid var(--primary);box-shadow:0 12px 30px -16px var(--primary-shadow)}
  button.share-card{display:block;width:100%;text-align:left;font:inherit;cursor:pointer;transition:transform .06s ease}
  button.share-card:active{transform:scale(.99)}
  .sc-row{display:flex;align-items:center;justify-content:space-between}
  .sc-brand{display:flex;align-items:center;gap:8px}
  .sc-brand .wm{font-weight:700;font-size:18px;color:var(--primary);letter-spacing:-.3px}
  .sc-date{font-size:11.5px;font-weight:600;color:var(--ink3)}
  .sc-score{display:flex;align-items:baseline;gap:10px;margin-top:18px}
  .sc-score .big{font-weight:700;font-size:46px;color:var(--primary);letter-spacing:-1.5px;font-variant-numeric:tabular-nums}
  .sc-score .st{font-size:14px;font-weight:700;color:var(--ink)}
  .sc-pips{display:flex;gap:8px;margin-top:18px}
  .sc-pip{flex:1;height:36px;border-radius:8px;background:var(--card);border:2px solid var(--hair);display:flex;align-items:center;justify-content:center}
  .sc-pip.right{border-color:var(--mint)} .sc-pip.right svg{stroke:var(--mint)}
  .sc-legend{display:flex;align-items:center;gap:14px;margin-top:14px;font-size:11px;font-weight:600;color:var(--ink3)}
  .sc-legend span.lg{display:inline-flex;align-items:center;gap:5px}
  .sc-legend .sw{width:13px;height:13px;border-radius:4px;border:2px solid;display:inline-block}
  .sc-legend .sw.caught{border-color:var(--mint)} .sc-legend .sw.fooled{border-color:var(--hair)}
  .sc-legend .url{margin-left:auto;font-weight:700;color:var(--primary-dark)}   /* AA: 11px label */

  .rv-actions{display:flex;gap:11px;margin-top:14px}
  .rv-actions .copy{flex:1;border:2px solid var(--track);cursor:pointer;background:var(--card);color:var(--ink);border-radius:10px;padding:15px;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;min-height:52px}
  .rv-actions .copy svg{stroke:var(--ink)}
  .rv-actions .board{flex:1;cursor:pointer;background:transparent;border:2.5px solid var(--primary);color:var(--primary-dark);border-radius:10px;padding:15px;font-weight:700;font-size:15px;min-height:52px}   /* AA: 15px normal text */
  .rv-preview{margin-top:12px;background:var(--card);border-radius:9px;padding:13px 15px;box-shadow:0 4px 14px -12px rgba(40,50,90,.4)}
  .rv-preview .k{font-size:10.5px;font-weight:700;color:var(--ink3);margin-bottom:8px}
  .rv-preview .t{font-size:13.5px;font-weight:600;color:#3A3D55;line-height:1.55;white-space:pre-wrap}
  .rv-bait{margin-top:18px;background:var(--card);border-radius:9px;padding:17px;box-shadow:0 5px 16px -12px rgba(40,50,90,.4)}
  .rv-bait .h{font-size:16px;font-weight:600;color:var(--ink)}
  .rv-bait .s{font-size:13px;font-weight:500;color:var(--ink3);margin-top:3px;margin-bottom:13px}
  .rv-bait button{width:100%;border:2px solid var(--track);cursor:pointer;background:var(--card);color:var(--primary-dark);border-radius:9px;padding:14px;font-weight:700;font-size:15px;min-height:50px}
  .rv-bait button.sent{border-color:var(--mint);background:#E7F8F1;color:var(--mint)}
  .rv-count{text-align:center;margin-top:22px;font-size:13px;font-weight:600;color:var(--ink3)}
  .rv-count b{color:var(--ink);font-weight:700}
  .rv-links{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px;font-size:13px;font-weight:600;color:var(--ink3)}
  .rv-links button{color:var(--ink3);background:none;border:none;cursor:pointer;font:inherit;font-weight:600;padding:6px 2px}
  .rv-foot{text-align:center;margin-top:16px;font-size:11px;font-weight:500;color:var(--ink3);line-height:1.6}
  .rv-foot a{color:var(--ink3);cursor:pointer;text-decoration:underline}
  .rv-actions .copy:active,.rv-actions .board:active,.rv-bait button:active{transform:scale(.98)}
  .rv-actions .copy,.rv-actions .board,.rv-bait button{transition:transform .06s ease, background .2s}

  /* reveal = hub: one-tap chips for the lanes you haven't played today (or the clean-sweep block) */
  .rv-today{margin-top:22px;background:var(--card);border-radius:9px;padding:15px;box-shadow:var(--shadow-card)}
  .rv-today.swept{background:#E7F8F1;box-shadow:none}
  .rt-head{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .rt-title{font-size:15px;font-weight:700;color:var(--ink)}
  .rv-today.swept .rt-title{color:#1C6B4F}
  .rt-left{margin-left:auto;font-size:12.5px;font-weight:700;color:var(--ink3);font-variant-numeric:tabular-nums}
  .rt-sub{font-size:13.5px;font-weight:500;color:#1C6B4F;line-height:1.4}
  .rt-chips{display:flex;flex-wrap:wrap;gap:9px}
  .rt-chip{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--track);background:var(--card);cursor:pointer;
    border-radius:999px;padding:9px 14px;font-weight:700;font-size:14px;color:var(--ink);min-height:44px}
  .rt-chip .rt-dot{width:10px;height:10px;border-radius:50%;flex:none}
  .rt-chip:active{transform:scale(.97)} .rt-chip{transition:transform .06s ease}
  .rt-chip:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
  /* secondary "play again" on a done-lane review (read-only reveal) — never touches the streak */
  .rv-replay{width:100%;margin-top:16px;background:var(--card);border:2px solid var(--track);cursor:pointer;color:var(--primary-dark);
    border-radius:9px;padding:13px;font-weight:700;font-size:15px;min-height:50px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
  .rv-replay .rv-replay-sub{font-weight:500;font-size:12.5px;color:var(--ink3)}
  .rv-replay:active{transform:scale(.99)} .rv-replay{transition:transform .06s ease}

  /* ============================================================
     BRIGHT REDESIGN — Crew board + bottom sheets (Phases 4 & 5)
     ============================================================ */
  body.scr-crew header{display:none}
  #screen-crew{padding-bottom:36px}
  @keyframes sit-rise{0%{transform:translateY(36px) scale(.98);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}
  @keyframes sit-fade{0%{opacity:0}100%{opacity:1}}
  @keyframes sit-sheet{0%{transform:translateY(40px) scale(.98);opacity:.4}100%{transform:translateY(0) scale(1);opacity:1}}

  .cr-name{display:flex;align-items:center;gap:9px;background:none;border:none;cursor:pointer;padding:6px 4px;min-height:44px}
  .cr-name .nm{font-weight:700;font-size:24px;color:var(--ink);letter-spacing:-.4px;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cr-name .chev{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;background:var(--primary-soft);flex:none}
  .cr-name .chev svg{stroke:var(--primary)}
  .cr-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
  .cr-seclabel{font-size:12px;font-weight:700;color:var(--ink3)}
  .seg-toggle{display:flex;background:var(--card);border-radius:8px;padding:3px;gap:2px;box-shadow:0 4px 14px -12px rgba(40,50,90,.4)}
  .seg-toggle button{border:none;cursor:pointer;border-radius:6px;padding:8px 14px;font-weight:600;font-size:13px;min-height:44px;background:transparent;color:var(--ink2)}
  .seg-toggle button.on{background:var(--ink);color:#fff}
  .cr-gap{margin-top:14px;background:var(--primary-soft);border-radius:9px;padding:13px 15px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--primary-dark)}
  .cr-gap svg{stroke:var(--primary);flex:none}
  .cr-rows{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .cr-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:8px;background:var(--card);border:2px solid var(--card);box-shadow:0 4px 14px -12px rgba(40,50,90,.4)}
  .cr-row.you{background:var(--primary-soft);border-color:var(--primary);box-shadow:0 8px 22px -14px var(--primary-shadow);animation:sit-rise .45s cubic-bezier(.34,1.4,.64,1) both}
  .cr-row .rk{font-weight:700;font-size:15px;color:var(--ink3);width:20px;text-align:center;font-variant-numeric:tabular-nums;flex:none}
  .cr-row.you .rk{color:var(--primary-dark)}
  .cr-row .who{flex:1;min-width:0}
  .cr-row .who .nm{font-size:15px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
  .cr-row .moved{font-size:10px;font-weight:700;color:var(--mint);background:transparent;border:1px solid var(--mint);padding:2px 7px;border-radius:7px}
  .cr-row .barwrap{height:6px;background:#EEF0F6;border-radius:3px;margin-top:7px;overflow:hidden}
  .cr-row .bar{height:100%;background:#C9CDDE;border-radius:3px}
  .cr-row.you .bar{background:var(--primary)}
  .cr-row .sc{font-weight:700;font-size:18px;color:var(--ink);font-variant-numeric:tabular-nums;flex:none}
  .cr-tiles{display:flex;gap:10px;margin-top:16px}
  .cr-tile{flex:1;border-radius:8px;padding:14px 15px}
  .cr-tile .big{font-weight:700;font-size:21px}
  .cr-tile .lbl{font-size:11.5px;font-weight:600;margin-top:4px}
  .cr-tile.streak{background:#FFF4E2} .cr-tile.streak .big{color:#9A5B12} .cr-tile.streak .lbl{color:#8A6A3E}
  .cr-tile.champ{background:var(--primary-soft)} .cr-tile.champ .big{color:var(--primary-dark)} .cr-tile.champ .lbl{color:var(--ink3)}
  .cr-invite{width:100%;margin-top:18px;cursor:pointer;background:transparent;border:2.5px solid var(--primary);color:var(--primary);border-radius:9px;padding:18px;font-weight:700;font-size:19px;letter-spacing:-.2px}
  .cr-code{text-align:center;margin-top:12px;font-size:13px;font-weight:600;color:var(--ink3)}
  .cr-code b{color:var(--ink);font-weight:700;letter-spacing:.06em}
  .cr-foot{text-align:center;margin-top:16px;font-size:12px;font-weight:500;color:var(--ink3)}
  .cr-join2{width:100%;margin-top:12px;background:var(--card);border:2px solid var(--track);cursor:pointer;color:var(--primary-dark);
    border-radius:9px;padding:14px;font-weight:700;font-size:15px;min-height:50px}
  .cr-join2:active{transform:scale(.99)} .cr-join2{transition:transform .06s ease}
  .fooled-tag{display:inline-block;margin-top:6px;font-size:11px;font-weight:700;color:#8A4A4D;background:#FFF1F1;border-radius:7px;padding:3px 8px}
  .cr-meta{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:14px;font-size:13px;font-weight:600;color:var(--ink3)}
  .cr-meta button{color:var(--ink3);background:none;border:none;cursor:pointer;font:inherit;font-weight:600;padding:6px 2px}
  .cr-joined{background:var(--primary-soft);border-radius:11px;padding:18px;text-align:center;margin-top:8px;box-shadow:var(--shadow-raised)}
  .cr-joined b{color:var(--ink);font-size:17px;font-weight:700}
  .cr-joined .s{font-size:13px;color:var(--ink2);margin-top:4px;font-weight:500}
  .cr-joined button{margin-top:12px;width:100%;cursor:pointer;background:transparent;border:2.5px solid var(--primary);color:var(--primary);border-radius:9px;padding:14px;font-weight:700;font-size:16px;min-height:50px}
  .cr-empty{background:var(--card);border-radius:11px;padding:22px;box-shadow:var(--shadow-card);margin-top:8px}
  .cr-empty .h{font-weight:700;font-size:20px;color:var(--ink);letter-spacing:-.3px}
  .cr-empty .s{font-size:14px;font-weight:500;color:var(--ink2);margin:8px 0 16px;line-height:1.45}
  .cr-empty .start{width:100%;cursor:pointer;background:transparent;border:2.5px solid var(--primary);color:var(--primary);border-radius:9px;padding:16px;font-weight:700;font-size:17px;min-height:52px}
  .cr-empty .codebtn{width:100%;margin-top:10px;border:2px solid var(--track);background:var(--card);color:var(--ink2);border-radius:9px;padding:14px;font-weight:700;font-size:15px;cursor:pointer;min-height:50px}
  .cr-empty .eh{text-align:center;font-size:12.5px;color:var(--ink3);margin:14px 0 6px;font-weight:500}
  /* account card (restyled to the new system) */
  .acct{background:var(--card);border-radius:11px;padding:18px;box-shadow:var(--shadow-card);margin-top:16px}
  .acct .h{font-weight:700;font-size:16px;color:var(--ink)}
  .acct .s{font-size:13px;font-weight:500;color:var(--ink2);margin:5px 0 12px;line-height:1.4}
  .acct .fld{width:100%;padding:12px 13px;border-radius:9px;border:2px solid var(--track);background:var(--card);font:inherit;font-size:15px;color:var(--ink);margin-bottom:9px}
  .acct .primary{width:100%;cursor:pointer;background:transparent;border:2.5px solid var(--primary);color:var(--primary);border-radius:9px;padding:14px;font-weight:700;font-size:15px;min-height:50px}
  .acct .ghost{width:100%;margin-top:9px;cursor:pointer;background:var(--card);border:2px solid var(--track);color:var(--ink2);border-radius:9px;padding:14px;font-weight:700;font-size:15px;min-height:50px}

  /* bottom sheets */
  .sheet-backdrop{position:fixed;inset:0;background:rgba(35,37,58,.42);display:flex;align-items:flex-end;justify-content:center;z-index:70;animation:sit-fade .2s both}
  .sheet{width:100%;max-width:460px;background:var(--card);border-radius:9px 9px 34px 34px;padding:20px 20px 30px;animation:sit-sheet .32s cubic-bezier(.34,1.4,.64,1) both;max-height:86vh;overflow-y:auto}
  .sheet-grab{width:42px;height:5px;border-radius:3px;background:#E3E5EE;margin:0 auto 16px}
  .sheet-title{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:12px}
  .sheet-close{width:100%;margin-top:14px;border:none;cursor:pointer;background:#F1F2F8;color:var(--ink2);border-radius:9px;padding:15px;font-weight:600;font-size:15px;min-height:50px}
  .sw-row{border:2px solid var(--track);cursor:pointer;background:var(--card);border-radius:8px;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;min-height:62px;text-align:left;width:100%;margin-bottom:9px}
  .sw-row.active{border-color:var(--primary);background:var(--primary-soft)}
  .sw-row .nm{font-weight:700;font-size:17px;color:var(--ink)}
  .sw-row .sub{font-size:12.5px;font-weight:500;color:var(--ink3);margin-top:2px}
  .sw-row .code{font-weight:700;font-size:13px;color:var(--ink3);letter-spacing:.06em}
  .sw-row.active .code{color:var(--primary-dark)}
  .sw-row .chk{display:flex} .sw-row .chk svg{stroke:var(--primary)}
  .sw-add{width:100%;border:2px dashed var(--track);background:none;cursor:pointer;border-radius:8px;padding:14px;font-weight:700;font-size:15px;color:var(--primary-dark);min-height:50px}
  .ag-icon{width:48px;height:48px;border-radius:9px;background:#F1ECFF;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
  .ag-icon svg{stroke:var(--purple)}
  .ag-title{font-weight:700;font-size:23px;color:var(--ink);letter-spacing:-.3px}
  .ag-body{font-size:14.5px;font-weight:500;color:var(--ink2);margin-top:8px;line-height:1.45}
  .ag-confirm{width:100%;margin-top:20px;cursor:pointer;background:transparent;border:2.5px solid var(--purple);color:var(--purple);border-radius:8px;padding:16px;font-weight:700;font-size:17px;min-height:54px}
  .ag-cancel{width:100%;margin-top:10px;border:none;cursor:pointer;background:none;color:var(--ink3);border-radius:9px;padding:14px;font-weight:600;font-size:15px;min-height:48px}
  .st-row{border:none;cursor:pointer;background:#F7F8FC;border-radius:8px;padding:16px;display:flex;align-items:center;justify-content:space-between;min-height:66px;text-align:left;width:100%;margin-bottom:9px}
  .st-row .lbl{font-size:12px;font-weight:700;color:var(--ink3)}
  .st-row .val{font-weight:700;font-size:23px;color:var(--ink);margin-top:2px;letter-spacing:-.4px}
  .st-row .chev{display:flex} .st-row .chev svg{stroke:var(--primary)}
  .st-back{border:none;cursor:pointer;background:none;display:flex;align-items:center;gap:6px;padding:2px 2px 14px;font-size:14px;font-weight:500;color:var(--primary-dark)}   /* AA: 14px regular */
  .st-back svg{stroke:var(--primary-dark)}
  .st-kicker{font-size:12px;font-weight:700;color:var(--ink3)}
  .st-big{display:flex;align-items:baseline;gap:10px;margin-top:4px}
  .st-big .n{font-weight:700;font-size:42px;color:var(--primary);letter-spacing:-1px}
  .st-big .s{font-size:15px;font-weight:600;color:var(--ink3)}
  .st-blurb{font-size:14.5px;font-weight:500;color:var(--ink2);margin-top:8px;line-height:1.45}
  .st-bars{margin-top:20px;display:flex;flex-direction:column;gap:13px}
  .st-bar{display:flex;align-items:center;gap:12px}
  .st-bar .bl{font-size:13px;font-weight:600;color:var(--ink2);width:96px;flex:none}
  .st-bar .bw{flex:1;height:10px;background:#EEF0F6;border-radius:5px;overflow:hidden}
  .st-bar .bf{height:100%;border-radius:5px}
  .st-bar .bv{font-size:13px;font-weight:600;color:var(--ink);width:42px;text-align:right;flex:none;font-variant-numeric:tabular-nums}
  .cr-invite:active,.cr-empty .start:active,.sw-row:active,.st-row:active,.ag-confirm:active,.acct .primary:active{transform:scale(.98)}
  .cr-invite,.cr-empty .start,.sw-row,.st-row,.ag-confirm{transition:transform .06s ease, background .2s, border-color .15s}

  /* ============================================================
     UI BUILD amendments — Home (B) + Magpie page (D)
     ============================================================ */
  /* in-crew hero: "CREWS" eyebrow above the crew name */
  .hc-eyebrow{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--primary-dark);opacity:.75;margin-bottom:6px}
  /* streak hero: the streak-ladder name beside the number; whole block is a button */
  .streak-blk{cursor:pointer;border-radius:10px}
  .streak-blk:focus-visible{outline:2px solid var(--primary);outline-offset:3px}
  .streak-ladder{font-weight:700;font-size:15px;color:#9A5B12;margin-left:2px}   /* AA on the home canvas (amber fill fails as small text) */
  /* Magpie page */
  body.scr-magpie header{display:none}
  #screen-magpie{padding-bottom:40px}
  .mag-hero{display:flex;flex-direction:column;align-items:center;text-align:center;background:var(--primary-soft);
    border-radius:12px;padding:26px 20px 24px;margin-top:8px;box-shadow:var(--shadow-raised)}
  .mag-hero .mags-cycle{animation:mags-bob 2.8s ease-in-out infinite}
  .mag-hero .mag-name{font-weight:700;font-size:26px;color:var(--ink);letter-spacing:-.4px;margin-top:10px}
  .mag-hero .mag-tag{font-size:14px;font-weight:600;color:var(--primary-dark);margin-top:2px}
  .mag-card{background:var(--card);border-radius:11px;padding:18px;margin-top:14px;box-shadow:var(--shadow-card)}
  .mag-card .mc-h{font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
  .mag-story{font-size:15px;font-weight:500;color:var(--ink2);line-height:1.55}
  .mag-facts{list-style:none;margin:6px 0 0;padding:0}
  .mag-facts li{display:flex;gap:10px;align-items:flex-start;font-size:14px;font-weight:500;color:var(--ink2);line-height:1.45;padding:7px 0}
  .mag-facts li .dot{flex:none;width:8px;height:8px;border-radius:50%;background:var(--primary);margin-top:6px}
  .mag-facts li b{color:var(--ink);font-weight:700}

  /* Stats page (E1) + Ranks page (E2) */
  body.scr-stats header, body.scr-ranks header{display:none}
  #screen-stats, #screen-ranks{padding-bottom:40px}
  .stats-range{margin-top:4px}
  .stats-range button{flex:1}
  .st-summary{display:flex;gap:9px;margin-top:14px}
  .st-cell{flex:1;background:var(--card);border-radius:9px;padding:14px 10px;text-align:center;box-shadow:var(--shadow-card)}
  .st-cell .v{font-weight:700;font-size:22px;color:var(--ink);letter-spacing:-.4px;font-variant-numeric:tabular-nums}
  .st-cell .k{font-size:11px;font-weight:700;color:var(--ink3);margin-top:3px}
  .st-jrow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--track);font-size:14px;font-weight:500;color:var(--ink2)}
  .st-jrow:last-child{border-bottom:none} .st-jrow b{color:var(--ink);font-weight:700}
  .spark{display:flex;align-items:flex-end;gap:5px;height:80px;padding-top:6px}
  .sp-col{flex:1;height:100%;display:flex;align-items:flex-end}
  .sp-bar{width:100%;background:var(--primary);border-radius:4px 4px 0 0;min-height:6px}
  .sp-empty{font-size:13px;font-weight:500;color:var(--ink3);align-self:center}
  .st-link{width:100%;margin-top:14px;background:transparent;border:2px solid var(--track);cursor:pointer;color:var(--primary-dark);
    border-radius:10px;padding:14px;font-weight:700;font-size:15px;min-height:50px}
  .st-link:active{transform:scale(.99)} .st-link{transition:transform .06s ease}
  .st-cohort{opacity:.85}
  .st-cohort-ph{margin-top:10px;background:var(--canvas);border:1.5px dashed var(--hair);border-radius:8px;padding:16px;text-align:center;font-size:13px;font-weight:600;color:var(--ink3)}
  .rk-intro{font-size:14.5px;font-weight:500;color:var(--ink2);margin:2px 0 4px;line-height:1.5}
  .rk-intro b{color:var(--ink);font-weight:700}
  .rk-cur{font-size:14px;font-weight:500;color:var(--ink2);line-height:1.45;margin-bottom:12px}
  .rk-cur b{color:var(--ink);font-weight:700}
  .ld{display:flex;flex-direction:column;gap:2px}
  .ld-row{display:flex;align-items:center;gap:11px;padding:9px 8px;border-radius:8px}
  .ld-row.cur{background:var(--primary-soft)}
  .ld-badge{flex:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
    background:var(--track);color:var(--ink2)}   /* ink2 clears AA on the track fill */
  .ld-badge.skill.on{background:var(--primary);color:#fff}
  .ld-badge.streak{background:var(--track);filter:grayscale(1);opacity:.55}
  .ld-badge.streak.on{background:#FFF1DE;filter:none;opacity:1}
  .ld-name{flex:1;font-size:15px;font-weight:600;color:var(--ink)}
  .ld-row.cur .ld-name{color:var(--primary-dark);font-weight:700}
  .ld-thr{font-size:12px;font-weight:600;color:var(--ink3);font-variant-numeric:tabular-nums}

  /* ============================================================
     PHASE 2 — a11y (live regions + reduced-motion override), Settings, onboarding, freeze chip
     ============================================================ */
  /* visually-hidden live region (announcements for SR users) */
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
  .scr-title:focus-visible,[data-heading]:focus-visible{outline:2px solid var(--primary);outline-offset:3px}
  .scr-title:focus,[data-heading]:focus{outline:none}   /* programmatic focus-on-nav shouldn't draw a ring */
  /* reduced motion — OS preference AND the in-app override (body.rm) both calm the springy transitions */
  @media (prefers-reduced-motion: reduce){
    .qcard,.toast,.tr,.rv-streak .num,.cr-row.you,.rfbtn,.lockbtn2{transition:none !important;animation:none !important}
    .rv-confetti{display:none !important}
  }
  body.rm .mags-bob,body.rm .mags-cycle,body.rm .qcard,body.rm .toast,body.rm .tr,body.rm .rv-streak .num,
  body.rm .cr-row.you,body.rm .rfbtn,body.rm .lockbtn2,body.rm .ic.pop,body.rm .lockbtn2.pulse{animation:none !important;transition:none !important}
  body.rm .rv-confetti{display:none !important}

  /* freeze chip on Home (🛡️ N freeze left this week) */
  .freeze-chip{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:var(--primary-soft);
    border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:700;color:var(--primary-dark)}
  .freeze-chip.spent{background:var(--track);color:var(--ink3)}

  /* Settings screen */
  body.scr-settings header{display:none}
  #screen-settings{padding-bottom:40px}
  .set-sec{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink3);margin:20px 4px 6px}
  .set-card{background:var(--card);border-radius:11px;padding:6px 16px;box-shadow:var(--shadow-card)}
  .set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--track);min-height:56px}
  .set-row:last-child{border-bottom:none}
  .set-row .sl{font-weight:600;font-size:15px;color:var(--ink)} .set-row .ss{font-size:12.5px;color:var(--ink3);margin-top:2px}
  .set-ctl{flex:none;display:flex;align-items:center;gap:8px}
  /* 44px-tall tap area wrapping a 28px visual track */
  .switch{display:inline-flex;align-items:center;justify-content:center;width:52px;height:44px;padding:0;border:none;background:none;cursor:pointer;flex:none}
  .switch .track{position:relative;width:46px;height:28px;border-radius:999px;background:var(--track);transition:background .15s}
  .switch[aria-checked="true"] .track{background:var(--primary)}
  .switch .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .switch[aria-checked="true"] .knob{transform:translateX(18px)}
  .seg-mini{display:flex;background:var(--canvas);border-radius:8px;padding:3px;gap:2px}
  .seg-mini button{border:none;cursor:pointer;border-radius:6px;padding:8px 13px;font-weight:700;font-size:13px;min-height:44px;background:transparent;color:var(--ink2)}   /* 44px tap target */
  .seg-mini button.on{background:var(--ink);color:#fff}
  .set-link{width:100%;margin-top:12px;background:transparent;border:2px solid var(--track);cursor:pointer;color:var(--primary-dark);
    border-radius:10px;padding:14px;font-weight:700;font-size:15px;min-height:50px;text-align:center;display:block}
  .set-link:active{transform:scale(.99)} .set-link{transition:transform .06s ease}
  .set-link.danger{color:#B0282E;border-color:#F1CFCF}
  .set-foot{text-align:center;margin-top:18px;font-size:12px;font-weight:500;color:var(--ink3);line-height:1.6}
  .set-foot button{color:var(--ink3);background:none;border:none;cursor:pointer;font:inherit;text-decoration:underline;padding:4px}

  /* one-card "how to play" onboarding (uses the bottom-sheet shell) */
  .ob-title{font-weight:700;font-size:22px;color:var(--ink);letter-spacing:-.3px;margin-bottom:4px}
  .ob-sub{font-size:14px;font-weight:500;color:var(--ink2);margin-bottom:14px;line-height:1.45}
  .ob-steps{list-style:none;margin:0;padding:0}
  .ob-steps li{display:flex;gap:12px;align-items:flex-start;padding:9px 0;font-size:14.5px;font-weight:500;color:var(--ink2);line-height:1.4}
  .ob-steps li b{color:var(--ink);font-weight:700}
  .ob-steps .obn{flex:none;width:26px;height:26px;border-radius:50%;background:var(--primary-soft);color:var(--primary-dark);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
  .ob-go{width:100%;margin-top:16px;cursor:pointer;background:transparent;border:2.5px solid var(--primary);color:var(--primary-dark);border-radius:9px;padding:16px;font-weight:700;font-size:17px;min-height:52px}   /* AA: 17px isn't "large", so use the darker token for the label */
</style>
</head>
<body>
<header>
  <div class="brand">
    <button class="mags-btn mags-bob" id="magsBtn" aria-label="Meet Mags" title="Meet Mags"></button>
    <button class="wm-btn" id="logoBtn" aria-label="Said It? — home" title="Home"><span class="wm">Said It<b>?</b></span></button>
  </div>
  <div class="editiontag" id="editiontag"></div>
</header>
<div class="sub" id="sub">Six quotes from this week. Some are real. Some are made up.</div>
<div id="pastbar" class="hide"></div>

<!-- LOADING -->
<div id="screen-loading" class="card">Loading today's set…</div>

<!-- ERROR -->
<div id="screen-error" class="hide err"></div>

<!-- HOME (the hub) -->
<div id="screen-home" class="hide">
  <h1 class="sr-only" data-heading tabindex="-1">Said It? — today’s set</h1>
  <div id="homeHero"></div>
  <button class="play-cta" id="homePlay">Play today's set
    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  </button>
  <button class="fakes-note" id="homeFakes" aria-label="Meet Mags"></button>
  <div id="homeToday"></div>
  <div class="streak-blk" id="homeStreak"></div>
  <div id="homeCoach"></div>
  <div class="stat-row" id="homeStats"></div>
  <div class="home-links">
    <button class="navlink" id="homeArchive">Past editions</button>
    <span class="dot-sep">·</span>
    <button class="navlink" id="homeSettings">Settings</button>
    <span class="dot-sep hide" id="homeLinkSep">·</span>
    <button class="navlink hide" id="homeAccount">Save progress</button>
  </div>
</div>

<!-- MAGPIE page (painted by renderMagpie) -->
<div id="screen-magpie" class="hide"></div>

<!-- STATS page (E1, painted by renderStats) -->
<div id="screen-stats" class="hide"></div>

<!-- RANKS page (E2, painted by renderRanks) -->
<div id="screen-ranks" class="hide"></div>

<!-- LANES picker (painted by renderLanesPicker) -->
<div id="screen-lanes" class="hide"></div>

<!-- PLAY (one card at a time; painted by paintPlay) -->
<div id="screen-play" class="hide"></div>

<!-- REVEAL (painted by renderReveal) -->
<div id="screen-reveal" class="hide"></div>

<!-- SETTINGS (painted by renderSettings) -->
<div id="screen-settings" class="hide"></div>

<!-- ARCHIVE -->
<div id="screen-archive" class="hide">
  <div class="card">📚 <b>Past editions</b> — replay any day, or tap 🔗 to copy a link and send the questions to someone. Replaying old sets won't change your streak.</div>
  <div id="archiveList"></div>
  <div class="sticky"><button class="btn ghost" id="archiveBack">← Back</button></div>
</div>

<!-- CREW board (painted by renderCrew) -->
<div id="screen-crew" class="hide"></div>

<div class="toast" id="toast"></div>
<!-- a11y: polite live region — score reveal, streak bump, toasts are announced through here -->
<div id="srLive" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<!-- assertive region for toasts + the score reveal, so they don't coalesce with the polite screen-name announcement -->
<div id="srAlert" class="sr-only" role="status" aria-live="assertive" aria-atomic="true"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
