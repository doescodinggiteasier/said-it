name: Daily edition

# Generates a fresh "Said It?" edition every morning and pushes it, which rebuilds GitHub Pages.
# Fully autonomous: reals are verified verbatim against their source + cross-validated, political lines kept
# LIGHT/balanced (HARD_DENY still blocks crime/violence/slur/scandal in every lane), fakes innocuous +
# labelled, and the generator FAILS SAFE (commits nothing) rather than publish a bad set.

on:
  schedule:
    - cron: "0 7 * * *"        # 07:00 UTC = 12am Pacific / 1am Mountain / 2am Central / 3am Eastern (during US daylight time).
                                # NOTE: GitHub cron is fixed-UTC, so in winter (standard time) this shifts to 11pm PT / 2am ET.
  workflow_dispatch:            # also runnable by hand from the Actions tab (use inputs.force to overwrite)
    inputs:
      force:
        description: "Regenerate even if today's edition already exists"
        type: boolean
        default: false

permissions:
  contents: write               # lets the built-in token commit + push (which triggers the Pages build)

concurrency:
  group: said-it-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LLM SDKs
        # Both providers: the generator PREFERS Gemini (free GCP credit) when GEMINI_API_KEY is set,
        # and falls back to Claude (ANTHROPIC_API_KEY) if Gemini errors. Set either or both secrets.
        run: pip install google-genai anthropic

      - name: Generate today's editions (all category lanes)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAIDIT_MODEL: ${{ vars.SAIDIT_MODEL || 'claude-sonnet-4-6' }}
        run: |
          # Exit codes (generate_day.py main): 0 = wrote an edition · 2 = content FAIL-SAFE (thin bank / no verified
          # reals — tolerated per-run; the skip-alert step flags PERSISTENT gaps) · anything else = a REAL error
          # (LLM/provider outage, bad model or secret, code bug). We deliberately DROPPED `|| true`: a hard error must
          # fail the run LOUD (red) instead of hiding a total outage behind "No new editions this run" for 5 days.
          set +e                        # manage per-lane exit codes ourselves (don't let errexit abort the loop mid-way)
          failed=""
          for cat in general sports music politics movies nsfw; do
            echo "--- generating $cat ---"
            python tools/generate_day.py --category "$cat" ${{ (github.event.inputs.force == 'true') && '--force' || '' }}
            rc=$?
            if [ "$rc" -eq 0 ]; then echo "  $cat: wrote an edition";
            elif [ "$rc" -eq 2 ]; then echo "::warning::$cat fail-safe (thin bank / no verified reals) — wrote nothing this run";
            else echo "::error::$cat HARD-FAILED (exit $rc) — LLM/provider/code error, NOT a content fail-safe"; failed="$failed$cat "; fi
          done
          if [ -n "$failed" ]; then echo "::error::daily generation hard-failed for: $failed"; exit 1; fi

      - name: Commit & push if a new edition was written
        run: |
          if [ -n "$(git status --porcelain daily/ tools/)" ]; then
            git config user.name "said-it-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add daily/ tools/           # editions + per-lane ledgers (used_*.json) + self-filling evergreen banks, so they persist
            git commit -m "auto: daily editions $(date -u +%F)"
            git push
            echo "Published new editions."
          else
            echo "No new editions this run (fail-safe, or today already published). Site keeps serving the latest."
          fi

      - name: Skip-alert — every enabled lane must have published today (Batch 7a)
        # Runs AFTER the commit so successful lanes still ship. Exits non-zero (red ✗ + a clear message in the log)
        # if ANY enabled lane has no edition for today, so a silent stall can never go unnoticed again.
        run: python tools/generate_day.py --verify
