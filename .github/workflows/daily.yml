name: Daily edition

# Generates a fresh "Said It?" edition every morning and pushes it, which rebuilds GitHub Pages.
# Fully autonomous: reals are verified verbatim against their source, politics filtered, fakes kept
# innocuous + labelled, and the generator FAILS SAFE (commits nothing) rather than publish a bad set.

on:
  schedule:
    - cron: "0 7 * * *"        # 07:00 UTC = 12am Pacific / 1am Mountain / 2am Central / 3am Eastern (during US daylight time).
                                # NOTE: GitHub cron is fixed-UTC, so in winter (standard time) this shifts to 11pm PT / 2am ET.
  workflow_dispatch:            # also runnable by hand from the Actions tab (use inputs.force to overwrite)
    inputs:
      force:
        description: "Regenerate even if today's edition already exists"
        type: boolean
        default: false

permissions:
  contents: write               # lets the built-in token commit + push (which triggers the Pages build)

concurrency:
  group: said-it-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LLM SDKs
        # Both providers: the generator PREFERS Gemini (free GCP credit) when GEMINI_API_KEY is set,
        # and falls back to Claude (ANTHROPIC_API_KEY) if Gemini errors. Set either or both secrets.
        run: pip install google-genai anthropic

      - name: Generate today's edition
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAIDIT_MODEL: ${{ vars.SAIDIT_MODEL || 'claude-sonnet-4-6' }}
        run: |
          python tools/generate_day.py ${{ (github.event.inputs.force == 'true') && '--force' || '' }} || true

      - name: Commit & push if a new edition was written
        run: |
          if [ -n "$(git status --porcelain daily/ tools/used_quotes.json)" ]; then
            git config user.name "said-it-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add daily/ tools/used_quotes.json   # commit the no-repeat ledger too, so it persists
            git commit -m "auto: daily edition $(date -u +%F)"
            git push
            echo "Published a new edition."
          else
            echo "No new edition this run (fail-safe, or today already published). Site keeps serving the latest. Nothing to commit."
          fi
